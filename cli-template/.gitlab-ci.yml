stages:
  - lint
  - test-build
  - build-image
  - deploy

# ── CI: Merge Request checks ──────────────────────────────────────

.node-template: &node-template
  image: node:22-alpine
  tags:
    - docker
  before_script:
    - yarn install --frozen-lockfile
  cache:
    key:
      files:
        - yarn.lock
    paths:
      - node_modules/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint:
  <<: *node-template
  stage: lint
  script:
    - yarn lint

test-build:
  <<: *node-template
  stage: test-build
  script:
    - yarn build

# ── CD: Build Docker Image ────────────────────────────────────────

build-image:
  stage: build-image
  image: docker:27
  services:
    - docker:27-dind
  tags:
    - docker
  script:
    - docker compose -f deploy/docker/docker-compose.yml up -d --build --force-recreate app
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual

