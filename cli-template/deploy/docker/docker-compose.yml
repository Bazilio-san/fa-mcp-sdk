name: {{project.name}}

services:
  app:
    container_name: {{project.name}}
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
    image: ${IMAGE_TAG:-{{project.name}}:latest}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-{{port}}}:{{port}}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SERVICE_NAME=${SERVICE_NAME:-{{project.name}}}
      - SERVICE_INSTANCE=${SERVICE_INSTANCE:-prod}
      - WS_PORT={{port}}
    volumes:
      - ./config/local.yaml:/app/config/local.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:{{port}}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    mem_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
